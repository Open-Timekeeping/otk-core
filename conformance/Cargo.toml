[package]
name        = "conformance"
version     = "0.1.0"
edition     = "2021"
license     = "Apache-2.0"
description = "Open Timekeeping conformance suite: verifies implementations against the canonical contracts."

[dependencies]
event-model        = { path = "../event-model", features = ["serde"] }
otk-protocol       = { path = "../otk-protocol" }
otk-contracts      = { path = "../otk-contracts" }
port-out-event-log = { path = "../port-out-event-log" }
frame-codec        = { path = "../frame-codec" }
ingest-protocol    = { path = "../ingest-protocol" }
async-trait        = { workspace = true }
minicbor           = { version = "0.24", features = ["alloc"] }
tokio              = { version = "1", features = ["sync"] }

[dev-dependencies]
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
